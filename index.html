<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProChorder 11.0</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="top-bar">
      <div class="top-bar-left">
        <!-- 1. Projektväljare (För att byta låt under setlisten) -->
        <button id="project-selector-btn" class="tool-btn" title="Select song">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2.5"
            stroke="currentColor"
            style="width: 18px; height: 18px"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"
            />
          </svg>
          <span id="current-project-name" style="display: none"></span>
        </button>

        <!-- 3. ProChorder Logo -->
        <div class="app-logo">
          <img src="logo.png" alt="ProChorder Logo" class="logo-image" />
          <span>ProChorder</span>
        </div>

        <select id="project-list" style="display: none"></select>
        <div id="project-dropdown-menu" class="project-dropdown"></div>
      </div>

      <!-- HÄR ÄR HÖGRA SIDAN SOM FÖRSVANN -->
      <div class="top-bar-right">
        <div
          id="login-status-dot"
          class="status-dot offline"
          title="Offline"
        ></div>
        <!-- Dark Mode-knappen är tillbaka! -->
        <button
          id="btn-toggle-dark-mode"
          class="icon-btn"
          title="Toggle dark mode"
        ></button>

        <button id="btn-main-edit-toggle" title="Toggle Edit mode">EDIT</button>

<button id="hamburger-btn" class="icon-btn" title="Menu">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" style="width: 26px; height: 26px;">
            <g transform="translate(1.4065934065934016 1.4065934065934016) scale(2.81 2.81)">

            </g>
          </svg>
        </button>
        <!-- 2. NY AVSLUTA GIG-KNAPP (Litet rött kryss i samma dimensioner) -->
        <button
          id="btn-exit-setlist"
          class="tool-btn hidden"
          title="Exit Gig"
          style="
            border-color: var(--danger-bg);
            color: var(--danger-bg);
            background: var(--danger-bg-light);
            margin-left: 8px;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="3"
            stroke="currentColor"
            style="width: 18px; height: 18px"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </div>

    <div id="menu-overlay" class="is-closed"></div>

    <nav id="side-menu" class="is-closed">
      <div
        id="auth-container"
        class="sidebar-controls vertical"
        style="
          grid-column: span 3;
          border-bottom: 1px solid var(--border-soft);
          padding-bottom: 1em;
          margin-bottom: 1em;
        "
      >
        <div
          id="user-info"
          class="hidden"
          style="
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
          "
        >
          <img
            id="user-photo"
            src=""
            alt=""
            style="width: 32px; height: 32px; border-radius: 50%; display: none"
          />
          <span
            id="user-name"
            style="font-size: 0.85em; font-weight: 600"
          ></span>
        </div>

        <button
          id="btn-login-google"
          class="btn-primary"
          style="
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
          "
        >
          <svg style="width: 18px; height: 18px" viewBox="0 0 24 24">
            <path
              fill="currentColor"
              d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C9.03,19.27 6.59,17.38 6.59,13.31C6.59,9.45 8.94,7.4 12.19,7.4C14.12,7.4 15.6,8.11 16.57,9.07L18.57,7.09C17.16,5.77 15,4.68 12.19,4.68C7.69,4.68 3.75,7.79 3.75,13.31C3.75,18.8 7.5,22 12.19,22C16.85,22 21.56,19 21.56,13.3C21.56,12.53 21.44,11.67 21.35,11.1Z"
            />
          </svg>
          Sign in with Google
        </button>

        <button id="btn-logout" class="btn-secondary-style hidden">
          Sign out
        </button>
      </div>
      <input
        type="text"
        id="song-title"
        placeholder="Title"
        style="grid-column: span 3"
      />
      <input
        type="text"
        id="song-author"
        placeholder="Artist / Composer"
        style="grid-column: span 3"
      />

      <div
        class="sidebar-controls vertical"
        style="grid-column: span 3; gap: 0.5em"
      >
        <button id="btn-toggle-metronome" class="btn-secondary-style">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            class="icon-medium"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10.75 3.75l-4.5 14.5c-0.25 0.8 0.5 1.5 1.25 1.25L12 18.5l4.5 0.9c0.75 0.1 1.5-0.6 1.25-1.25L13.25 3.75a0.75 0.75 0 00-1.5 0zM12 4.5v15M11.25 7.5a0.75 0.75 0 011.5 0v5.25a0.75 0.75 0 01-1.5 0V7.5z"
            />
          </svg>
        </button>

        <div
          id="combined-controls-row"
          class="sidebar-controls horizontal"
          style="gap: 8px"
        >
          <div class="control-group-half bpm-control-wrapper">
            <button id="btn-bpm-down" class="btn-bpm-control minimal-control">
              -
            </button>
            <div id="bpm-control-container" class="bpm-input-container">
              <input
                type="number"
                id="metronome-bpm-input"
                value="120"
                min="40"
                max="300"
                placeholder="120"
              />
            </div>
            <button id="btn-bpm-up" class="btn-bpm-control minimal-control">
              +
            </button>
          </div>
        </div>
      </div>

      <div class="menu-grid" style="grid-column: span 3">
        <button id="btn-open-tuner-modal" class="menu-grid-btn">
          <span class="menu-grid-title">Tuner</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.467l2.31-.66a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.467l2.31-.66A2.25 2.25 0 009 15.553z"
            />
          </svg>
        </button>

        <button id="btn-toggle-chord-mode" class="menu-grid-btn">
          <span class="menu-grid-title">Chord Mode</span>
          <span id="chord-mode-icon-text" class="menu-grid-icon-text">C</span>
        </button>

        <button id="btn-open-create-setlist" class="menu-grid-btn">
          <span class="menu-grid-title">Share setlist</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z"
            />
          </svg>
        </button>

        <button id="btn-open-fetch-setlist" class="menu-grid-btn">
          <span class="menu-grid-title">Get Setlist</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
            />
          </svg>
        </button>

        <button id="btn-open-backup-modal" class="menu-grid-btn">
          <span class="menu-grid-title">Backup</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
            />
          </svg>
        </button>

        <button id="btn-open-band-modal" class="menu-grid-btn">
          <span class="menu-grid-title">Band</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"
            />
          </svg>
        </button>

        <button id="btn-new-project" class="menu-grid-btn">
          <span class="menu-grid-title">New Song</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 4.5v15m7.5-7.5h-15"
            />
          </svg>
        </button>

        <button id="btn-save-copy" class="menu-grid-btn">
          <span class="menu-grid-title">Save Copy</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5"
            />
          </svg>
        </button>

        <button id="btn-show-help" class="menu-grid-btn">
          <span class="menu-grid-title">Help</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"
            />
          </svg>
        </button>

        <button id="btn-save-project" class="menu-grid-btn menu-btn-save">
          <span class="menu-grid-title">Save song</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4.5 12.75l6 6 9-13.5"
            />
          </svg>
        </button>

        <button id="btn-delete-project" class="menu-grid-btn menu-btn-danger">
          <span class="menu-grid-title">Remove song</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>

        <button
          id="btn-delete-all-projects"
          class="menu-grid-btn menu-btn-danger"
        >
          <span class="menu-grid-title">Erase all</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="menu-grid-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"
            />
          </svg>
        </button>
      </div>
    </nav>

    <div class="container">
      <div class="app-layout">
        <main class="main-content">
          <div id="editor" contenteditable="true" spellcheck="false"></div>
        </main>
      </div>
    </div>

    <div id="scroll-controls">
      <button id="scroll-btn-play-pause">▶</button>
      <div class="speed-control">
        <input
          type="range"
          id="scroll-speed-slider"
          min="0"
          max="100"
          value="20"
        />
      </div>
      <div class="duration-control">
        <input
          type="number"
          id="scroll-duration-minutes"
          min="0"
          max="60"
          value="4"
        />
        <span>m</span>
        <input
          type="number"
          id="scroll-duration-seconds"
          min="0"
          max="59"
          step="5"
          value="0"
        />
        <span>s</span>
        <div id="scroll-duration-display">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM10 4.5a.75.75 0 00-.75.75v4.5a.75.75 0 00.75.75h3.75a.75.75 0 000-1.5H10.5V5.25A.75.75 0 0010 4.5z"
              clip-rule="evenodd"
            />
          </svg>
          <span id="scroll-duration-text">4:00</span>
        </div>
      </div>

      <button id="scroll-btn-prev" class="scroll-nav-btn">&lt;&lt;</button>
      <button id="scroll-btn-next" class="scroll-nav-btn">&gt;&gt;</button>
